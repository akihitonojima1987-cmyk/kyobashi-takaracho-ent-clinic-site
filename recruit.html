<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>求人情報(準備中)| 岩佐耳鼻咽喉科</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #f0f5e0 0%, #f5f8eb 100%);
    color: #2d2d2d;
    padding: 24px;
    line-height: 1.8;
  }
  .container {
    text-align: center;
    max-width: 560px;
    padding: 56px 32px;
    background: #ffffff;
    border: 1px solid #c5dba5;
    box-shadow: 0 2px 8px rgba(95, 168, 64, 0.08);
    border-radius: 8px;
  }
  h1 {
    font-size: 32px;
    font-weight: 400;
    color: #2d5a1c;
    margin-bottom: 28px;
    letter-spacing: 0.4em;
  }
  .divider {
    width: 56px;
    height: 1px;
    background: #5fa840;
    margin: 0 auto 28px;
  }
  p {
    font-size: 15px;
    color: #555;
    line-height: 2.0;
    letter-spacing: 0.05em;
  }
  .clinic-name {
    font-size: 14px;
    color: #888;
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid #e5e9ed;
    letter-spacing: 0.15em;
    font-weight: 500;
  }
  @media (max-width: 480px) {
    .container { padding: 40px 20px; }
    h1 { font-size: 24px; letter-spacing: 0.3em; }
  }
</style>
</head>
<body>
<main class="container">
  <h1>準備中</h1>
  <div class="divider"></div>
  <p>求人情報のページは現在準備中です。<br />今しばらくお待ちください。</p>
  <p class="clinic-name">岩佐耳鼻咽喉科</p>
</main>
</body>
</html>
