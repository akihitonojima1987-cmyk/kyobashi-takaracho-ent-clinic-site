<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>準備中</title>
<meta name="robots" content="noindex, nofollow">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: #f6f9ff; color: #3a423e; text-align: center; padding: 24px;
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
  }
  .box { max-width: 440px; }
  .dot { width: 56px; height: 56px; border-radius: 50%; background: #e8f0fe; color: #1a66d6;
         display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 20px; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 14px; letter-spacing: 0.03em; }
  p  { font-size: 14.5px; line-height: 2.0; color: #5b645f; margin: 0; }
</style>
</head>
<body>
  <div class="box">
    <div class="dot">◷</div>
    <h1>ただいま準備中です</h1>
    <p>ホームページは現在準備中です。<br>公開まで今しばらくお待ちください。</p>
  </div>
</body>
</html>
